<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConectaOffice — Activar Licencia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0ff;
    font-family: 'Rajdhani', sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Fondo animado */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(0,120,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(0,255,180,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,120,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,120,255,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .card {
    background: rgba(12, 12, 28, 0.92);
    border: 1px solid rgba(0,120,255,0.3);
    border-radius: 4px;
    padding: 48px 52px;
    width: 520px;
    position: relative;
    box-shadow:
      0 0 60px rgba(0,120,255,0.12),
      inset 0 0 40px rgba(0,0,0,0.4);
  }

  .card::before {
    content: '';
    position: absolute;
    top: -1px; left: 20px; right: 20px; height: 2px;
    background: linear-gradient(90deg, transparent, #0078ff, #00ffb4, transparent);
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 4px;
    color: #fff;
    margin-bottom: 4px;
  }
  .logo span { color: #0078ff; }

  .subtitle {
    font-size: 13px;
    color: rgba(160,160,220,0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(160,160,220,0.7);
    margin-bottom: 8px;
    display: block;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 28px;
  }

  input[type=text] {
    width: 100%;
    background: rgba(0,0,20,0.6);
    border: 1px solid rgba(0,120,255,0.35);
    border-radius: 3px;
    color: #00ffb4;
    font-family: 'Orbitron', monospace;
    font-size: 15px;
    letter-spacing: 3px;
    padding: 14px 18px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    text-transform: uppercase;
  }

  input[type=text]:focus {
    border-color: #0078ff;
    box-shadow: 0 0 20px rgba(0,120,255,0.2);
  }

  input[type=text]::placeholder {
    color: rgba(0,255,180,0.25);
    font-size: 13px;
  }

  .btn-activar {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #0055cc, #0078ff);
    border: none;
    border-radius: 3px;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-activar:hover {
    background: linear-gradient(135deg, #0066dd, #00aaff);
    box-shadow: 0 0 30px rgba(0,120,255,0.4);
    transform: translateY(-1px);
  }

  .btn-activar:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .status {
    margin-top: 20px;
    padding: 12px 16px;
    border-radius: 3px;
    font-size: 13px;
    letter-spacing: 1px;
    display: none;
    text-align: center;
  }

  .status.error {
    background: rgba(255,40,40,0.1);
    border: 1px solid rgba(255,40,40,0.3);
    color: #ff6060;
    display: block;
  }

  .status.success {
    background: rgba(0,255,120,0.08);
    border: 1px solid rgba(0,255,120,0.3);
    color: #00ff88;
    display: block;
  }

  .status.loading {
    background: rgba(0,120,255,0.08);
    border: 1px solid rgba(0,120,255,0.3);
    color: #4499ff;
    display: block;
  }

  .device-info {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid rgba(0,120,255,0.15);
    font-size: 11px;
    color: rgba(160,160,220,0.45);
    letter-spacing: 1px;
    line-height: 1.8;
  }

  .device-info span { color: rgba(0,255,180,0.5); }

  /* Animación de scan */
  @keyframes scan {
    0%  { top: -2px; opacity: 0; }
    50% { opacity: 1; }
    100%{ top: 100%; opacity: 0; }
  }
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="card">
  <div class="logo">2050 <span>OFFICE</span></div>
  <div class="subtitle">Sistema de Activación de Licencias</div>

  <label class="label">Código de Licencia</label>
  <div class="input-wrap">
    <input type="text" id="codigo" placeholder="XXXXXX-XXXXXX-XXXXXX-XXXXXX"
           maxlength="27" autocomplete="off" spellcheck="false">
  </div>

  <button class="btn-activar" id="btnActivar" onclick="activar()">
    ⬡ &nbsp; ACTIVAR LICENCIA
  </button>

  <div class="status" id="status"></div>

  <div class="device-info" id="deviceInfo">
    Cargando información del equipo...
  </div>
</div>

<script>
  // Formatear input automáticamente
  const input = document.getElementById('codigo');
  input.addEventListener('input', () => {
    let v = input.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
    let parts = [];
    for (let i = 0; i < v.length && parts.length < 4; i += 6) {
      parts.push(v.substr(i, 6));
    }
    input.value = parts.join('-');
  });

  // Cargar info del equipo
  async function loadDeviceInfo() {
    try {
      const info = await window.chrome.webview.hostObjects.nativeApp.getDeviceInfo();
      document.getElementById('deviceInfo').innerHTML =
        `Equipo: <span>${info.hostname}</span> &nbsp;|&nbsp; ` +
        `Plataforma: <span>${info.platform}</span> &nbsp;|&nbsp; ` +
        `MAC: <span>${info.mac ? info.mac.substring(0,8) + '...' : 'Detectando...'}</span>`;
    } catch(e) {
      document.getElementById('deviceInfo').textContent = 'No se pudo leer información del equipo.';
    }
  }

  async function activar() {
    const codigo = document.getElementById('codigo').value.trim();
    const btn    = document.getElementById('btnActivar');
    const status = document.getElementById('status');

    if (codigo.length < 26) {
      showStatus('error', 'Ingresa el código completo de la licencia.');
      return;
    }

    btn.disabled = true;
    showStatus('loading', '⟳  Verificando licencia con el servidor...');

    try {
      const res = await window.chrome.webview.hostObjects.nativeApp.activarLicencia(codigo);
      if (res.ok) {
        showStatus('success', '✓  ' + res.mensaje);
        setTimeout(async () => {
          await window.chrome.webview.hostObjects.nativeApp.abrirSuite();
        }, 1800);
      } else {
        showStatus('error', '✗  ' + res.error);
        btn.disabled = false;
      }
    } catch(e) {
      showStatus('error', '✗  Error de conexión. Verifica tu internet.');
      btn.disabled = false;
    }
  }

  function showStatus(type, msg) {
    const s = document.getElementById('status');
    s.className = 'status ' + type;
    s.textContent = msg;
  }

  // Enter para activar
  document.getElementById('codigo').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') activar();
  });

  loadDeviceInfo();
</script>
</body>
</html>
