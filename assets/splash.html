<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ConectaOffice</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Rajdhani', sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@400&display=swap');
  .wrap {
    text-align: center;
    color: #e0e0ff;
  }
  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 6px;
    color: #fff;
    margin-bottom: 6px;
  }
  .logo span { color: #0078ff; }
  .sub {
    font-size: 12px;
    letter-spacing: 4px;
    color: rgba(160,160,220,0.5);
    text-transform: uppercase;
    margin-bottom: 48px;
  }
  .bar-outer {
    width: 300px;
    height: 2px;
    background: rgba(0,120,255,0.15);
    border-radius: 2px;
    margin: 0 auto;
    overflow: hidden;
  }
  .bar-inner {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #0078ff, #00ffb4);
    animation: load 1.8s ease-in-out forwards;
  }
  @keyframes load {
    0%   { width: 0%; }
    60%  { width: 75%; }
    100% { width: 100%; }
  }
  .status-txt {
    margin-top: 16px;
    font-size: 12px;
    letter-spacing: 2px;
    color: rgba(0,120,255,0.6);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">2050 <span>OFFICE</span></div>
  <div class="sub">Verificando licencia</div>
  <div class="bar-outer"><div class="bar-inner"></div></div>
  <div class="status-txt">Conectando con el servidor...</div>
</div>
</body>
</html>
