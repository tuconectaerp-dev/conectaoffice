name: Build ConectaOffice EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download WebView2 SDK
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path launcher\packages
          Invoke-WebRequest -Uri "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/1.0.2849.39" -OutFile "launcher\webview2.nupkg"
          Expand-Archive -Path "launcher\webview2.nupkg" -DestinationPath "launcher\packages\Microsoft.Web.WebView2" -Force

      - name: Compile ConectaOffice.exe
        shell: powershell
        run: |
          $csc = Get-ChildItem "$env:WINDIR\Microsoft.NET\Framework64" -Filter csc.exe -Recurse | Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Using CSC: $csc"
          $wv_forms = "launcher\packages\Microsoft.Web.WebView2\lib\net45\Microsoft.Web.WebView2.WinForms.dll"
          $wv_core  = "launcher\packages\Microsoft.Web.WebView2\lib\net45\Microsoft.Web.WebView2.Core.dll"
          & $csc /target:winexe /out:assets\ConectaOffice.exe /win32icon:assets\icon.ico /r:System.Windows.Forms.dll /r:System.Drawing.dll /r:$wv_forms /r:$wv_core launcher\ConectaOffice.cs
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Copy WebView2 DLLs
        shell: powershell
        run: |
          Copy-Item "launcher\packages\Microsoft.Web.WebView2\lib\net45\Microsoft.Web.WebView2.WinForms.dll" assets\
          Copy-Item "launcher\packages\Microsoft.Web.WebView2\lib\net45\Microsoft.Web.WebView2.Core.dll" assets\
          Copy-Item "launcher\packages\Microsoft.Web.WebView2\runtimes\win-x64\native\WebView2Loader.dll" assets\

      - name: Install NSIS
        shell: powershell
        run: choco install nsis -y

      - name: Build NSIS Installer
        shell: cmd
        run: '"C:\Program Files (x86)\NSIS\makensis.exe" ConectaOffice-Setup.nsi'

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ConectaOffice-Setup
          path: ConectaOffice-Setup-1.0.0.exe
