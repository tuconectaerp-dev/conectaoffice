name: Build ConectaOffice EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile ConectaOffice.exe
        shell: powershell
        run: |
          $csc = Get-ChildItem "$env:WINDIR\Microsoft.NET\Framework64" -Filter csc.exe -Recurse | Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "CSC: $csc"
          & $csc /target:winexe /out:assets\ConectaOffice.exe /win32icon:assets\icon.ico /r:System.Windows.Forms.dll /r:System.Drawing.dll launcher\ConectaOffice.cs
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Install NSIS
        shell: powershell
        run: choco install nsis -y

      - name: Build NSIS Installer
        shell: cmd
        run: '"C:\Program Files (x86)\NSIS\makensis.exe" ConectaOffice-Setup.nsi'

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ConectaOffice-Setup
          path: ConectaOffice-Setup-1.0.0.exe
