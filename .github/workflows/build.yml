name: Build ConectaOffice EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '4.8.x'

      - name: Download WebView2 SDK
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path launcher\packages
          Invoke-WebRequest -Uri "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/1.0.2849.39" -OutFile "launcher\webview2.nupkg"
          Expand-Archive -Path "launcher\webview2.nupkg" -DestinationPath "launcher\packages\Microsoft.Web.WebView2" -Force

      - name: Compile ConectaOffice.exe
        shell: cmd
        run: |
          for /d %%d in ("%WINDIR%\Microsoft.NET\Framework64\v4*") do set CSC=%%d\csc.exe
          %CSC% /target:winexe /out:assets\ConectaOffice.exe /win32icon:assets\icon.ico /r:System.Windows.Forms.dll /r:System.Drawing.dll /r:"launcher\packages\Microsoft.Web.WebView2\lib\net45\Microsoft.Web.WebView2.WinForms.dll" /r:"launcher\packages\Microsoft.Web.WebView2\lib\net45\Microsoft.Web.WebView2.Core.dll" launcher\ConectaOffice.cs

      - name: Copy WebView2 DLLs
        shell: cmd
        run: |
          copy /Y "launcher\packages\Microsoft.Web.WebView2\lib\net45\Microsoft.Web.WebView2.WinForms.dll" assets\
          copy /Y "launcher\packages\Microsoft.Web.WebView2\lib\net45\Microsoft.Web.WebView2.Core.dll" assets\
          copy /Y "launcher\packages\Microsoft.Web.WebView2\runtimes\win-x64\native\WebView2Loader.dll" assets\

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis -y
          refreshenv

      - name: Build NSIS Installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" ConectaOffice-Setup.nsi

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ConectaOffice-Setup
          path: ConectaOffice-Setup-1.0.0.exe
