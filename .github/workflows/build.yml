name: Build ConectaOffice EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WebView2 via NuGet
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" -OutFile nuget.exe
          .\nuget.exe install Microsoft.Web.WebView2 -Version 1.0.2849.39 -OutputDirectory launcher\packages -NonInteractive

      - name: Compile ConectaOffice.exe
        shell: powershell
        run: |
          $csc = Get-ChildItem "$env:WINDIR\Microsoft.NET\Framework64" -Filter csc.exe -Recurse | Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "CSC: $csc"
          $pkg = "launcher\packages\Microsoft.Web.WebView2.1.0.2849.39"
          $wv_forms = "$pkg\lib\net45\Microsoft.Web.WebView2.WinForms.dll"
          $wv_core  = "$pkg\lib\net45\Microsoft.Web.WebView2.Core.dll"
          & $csc /target:winexe /out:assets\ConectaOffice.exe /win32icon:assets\icon.ico /r:System.Windows.Forms.dll /r:System.Drawing.dll /r:$wv_forms /r:$wv_core launcher\ConectaOffice.cs
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Copy WebView2 DLLs
        shell: powershell
        run: |
          $pkg = "launcher\packages\Microsoft.Web.WebView2.1.0.2849.39"
          Copy-Item "$pkg\lib\net45\Microsoft.Web.WebView2.WinForms.dll" assets\
          Copy-Item "$pkg\lib\net45\Microsoft.Web.WebView2.Core.dll" assets\
          Copy-Item "$pkg\runtimes\win-x64\native\WebView2Loader.dll" assets\

      - name: Install NSIS
        shell: powershell
        run: choco install nsis -y

      - name: Build NSIS Installer
        shell: cmd
        run: '"C:\Program Files (x86)\NSIS\makensis.exe" ConectaOffice-Setup.nsi'

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ConectaOffice-Setup
          path: ConectaOffice-Setup-1.0.0.exe
